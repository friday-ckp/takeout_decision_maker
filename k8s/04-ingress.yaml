apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: takeout-ingress
  namespace: test
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "takeout-backend"
spec:
  ingressClassName: nginx
  rules:
    - host: takeout.test.huaqing.run
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: takeout-backend
                port:
                  number: 3000
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: takeout-backend
                port:
                  number: 3000
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: takeout-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: takeout-frontend
                port:
                  number: 80
