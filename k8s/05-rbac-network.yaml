# ===================== NetworkPolicy =====================
# 注：使用外部 RDS，无需 MySQL SA 和 MySQL NetworkPolicy

# 前端：允许来自 Ingress Controller（kube-system）的请求
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: takeout-allow-frontend
  namespace: test
spec:
  podSelector:
    matchLabels:
      app: takeout-frontend
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 80
---
# 后端：允许来自 Ingress Controller 的请求 + 允许出站访问外部 RDS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: takeout-allow-backend
  namespace: test
spec:
  podSelector:
    matchLabels:
      app: takeout-backend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - {}   # 允许所有出站（访问外部 RDS + DNS）
