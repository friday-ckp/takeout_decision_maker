apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: test
---
# 修复 nginx root 路径：Dockerfile 将文件复制到 /pages /scripts /styles，
# 而非默认的 /usr/share/nginx/html，需通过 ConfigMap 覆盖 nginx 配置。
apiVersion: v1
kind: ConfigMap
metadata:
  name: takeout-frontend-nginx-conf
  namespace: test
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /;

        location / {
            index pages/index.html;
            try_files $uri $uri/ /pages/index.html;
        }

        location /scripts/ {
            alias /scripts/;
        }

        location /styles/ {
            alias /styles/;
        }

        location /healthz {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location ~ /\. {
            deny all;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: takeout-frontend
  namespace: test
  labels:
    app: takeout-frontend
    version: "v1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: takeout-frontend
  template:
    metadata:
      labels:
        app: takeout-frontend
        version: "v1.0.0"
    spec:
      serviceAccountName: frontend-sa
      imagePullSecrets:
        - name: acr-registry-secret-hq
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: frontend
          image: crpi-dgkl9khr1943eg60.cn-hangzhou.personal.cr.aliyuncs.com/hq-service/takeout_decision_maker:frontend-v1.0.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
      volumes:
        - name: nginx-conf
          configMap:
            name: takeout-frontend-nginx-conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: takeout-frontend
  namespace: test
  labels:
    app: takeout-frontend
spec:
  selector:
    app: takeout-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
